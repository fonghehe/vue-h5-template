<style data-app-loading="inject-css">
  html {
    line-height: 1.15;
    -webkit-text-size-adjust: 100%;
  }

  .loading {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f4f7f9;
    transition: opacity 0.3s ease-out;
  }

  .loading.hidden {
    pointer-events: none;
    visibility: hidden;
    opacity: 0;
  }

  .dark .loading {
    background: #0d0d10;
  }

  /* Standard Spinner */
  .loader {
    width: 32px;
    height: 32px;
    border: 3px solid rgba(0, 0, 0, 0.1);
    border-left-color: hsl(var(--primary, 210 100% 50%));
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  .dark .loader {
    border-color: rgba(255, 255, 255, 0.1);
    border-left-color: hsl(var(--primary, 210 100% 50%));
  }

  .title {
    margin-top: 16px;
    font-size: 14px;
    color: rgb(0 0 0 / 45%);
  }

  .dark .title {
    color: rgb(255 255 255 / 45%);
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }
</style>
<div class="loading" id="__app-loading__">
  <div class="loader"></div>
  <div class="title"><%= VITE_APP_TITLE %></div>
</div>
